<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employment Questions</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <link rel="shortcut icon" href="../Assets/logo.jpg" type="image/x-icon" />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #f4f7f9;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
      }

      .container {
        width: 95%;
        max-width: 800px;
        margin: 50px auto;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        background: white;
        position: relative;
      }

      form label {
        display: block;
        margin-top: 15px;
        text-align: left;
        font-size: 16px;
        font-weight: bold;
        color: #333;
      }

      select,
      input {
        width: 98%;
        padding: 10px;
        margin-top: 5px;
        color: #333;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      #occupation {
        width: 95%;
        padding: 10px;
        margin-top: 5px;
        border-radius: 5px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      .error {
        color: red;
        font-size: 14px;
        text-align: left;
        margin-top: 5px;
      }

      button {
        margin-top: 20px;
        padding: 12px;
        width: 100%;
        background: #e67e22;
        color: white;
        font-size: 14px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        transition: background 0.3s ease-in-out;
      }

      button:hover {
        background: #ff7700;
      }

      .message {
        display: none;
        margin-top: 20px;
        padding: 15px;
        border-radius: 5px;
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form id="employment-form">
        <label
          >Are you employed?
          <select id="employment_status" name="employment_status" required>
            <option value="">Select</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </label>
        <div class="error" id="employment-error"></div>

        <label
          >Current Occupation:
          <input
            type="text"
            id="occupation"
            name="occupation"
            placeholder="Enter your occupation"
            disabled
            required
          />
          <div class="error" id="occupation-error"></div>
        </label>

        <button id="save-btn" type="submit">Submit</button>
      </form>
      <div class="message" id="employment-success-message">
        Employment details submitted successfully.
      </div>
    </div>

    <script>
      // ===============================
      // 🔐 AUTH
      // ===============================
      function parseJwt(token) {
        return JSON.parse(atob(token.split(".")[1]));
      }

      const token = localStorage.getItem("idToken");

      if (!token) {
        window.top.location.href = "../../Login/login.html";
      }

      let decoded;
      try {
        decoded = parseJwt(token);

        const now = Math.floor(Date.now() / 1000);
        if (decoded.exp < now) {
          localStorage.clear();
          window.top.location.href = "../../Login/login.html";
        }
      } catch (e) {
        localStorage.clear();
        window.top.location.href = "../../Login/login.html";
      }

      const userId = decoded.sub; // ✅ FIXED

      // ===============================
      // ENABLE/DISABLE OCCUPATION
      // ===============================
      document
        .getElementById("employment_status")
        .addEventListener("change", function () {
          const occupationField = document.getElementById("occupation");

          if (this.value === "yes") {
            occupationField.disabled = false;
          } else {
            occupationField.disabled = true;
            occupationField.value = "";
          }
        });

      // ===============================
      // 📥 LOAD DATA (DYNAMO)
      // ===============================
      async function loadEmploymentData() {
        try {
          const res = await fetch(`http://localhost:3000/getUser/${userId}`);
          const data = await res.json();

          if (data.employmentDetails) {
            document.getElementById("employment_status").value =
              data.employmentDetails.employment_status || "";

            document.getElementById("occupation").value =
              data.employmentDetails.occupation || "";

            document.getElementById("occupation").disabled =
              data.employmentDetails.employment_status !== "yes";
          }
        } catch (err) {
          console.error("Load Error:", err);
        }
      }

      // ===============================
      // 💾 SAVE DATA (DYNAMO)
      // ===============================
      document
        .getElementById("employment-form")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          document.getElementById("employment-success-message").style.display =
            "none";

          let isValid = true;

          const employmentStatus =
            document.getElementById("employment_status").value;

          const occupation = document.getElementById("occupation").value.trim();

          const employmentError = document.getElementById("employment-error");
          const occupationError = document.getElementById("occupation-error");

          // VALIDATION
          if (employmentStatus === "") {
            employmentError.textContent =
              "Please select your employment status.";
            isValid = false;
          } else {
            employmentError.textContent = "";
          }

          if (employmentStatus === "yes" && occupation === "") {
            occupationError.textContent = "Please enter your occupation.";
            isValid = false;
          } else {
            occupationError.textContent = "";
          }

          if (!isValid) return;

          try {
            const res = await fetch("http://localhost:3000/saveEmployment", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({
                userId,
                data: {
                  employment_status: employmentStatus,
                  occupation: occupation,
                },
              }),
            });

            const result = await res.json();

            if (result.success) {
              document.getElementById(
                "employment-success-message",
              ).style.display = "block";

              window.parent.postMessage(
                {
                  section: "question",
                  data: { employment_status: employmentStatus },
                },
                "*",
              );

              window.parent.postMessage("sectionSaved", "*");
            }
          } catch (err) {
            console.error("Save Error:", err);
            alert("Failed to save employment details");
          }
        });

      // ===============================
      // 🚀 INIT
      // ===============================
      document.addEventListener("DOMContentLoaded", loadEmploymentData);
    </script>
  </body>
</html>
